services:
  web:
    image: odoo:17.0
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_NAME: ${DB_NAME}
      DB_SSLMODE: ${DB_SSLMODE}
    secrets:
      - postgresql_password
    command: >
      sh -lc '
        : "${DB_HOST:?Missing DB_HOST}";
        : "${DB_USER:?Missing DB_USER}";
        : "${DB_NAME:?Missing DB_NAME}";
        : "${DB_PORT:?Missing DB_PORT}";
        test -f /run/secrets/postgresql_password || { echo "Missing secret /run/secrets/postgresql_password (create odoo_pg_pass on the host)"; exit 1; };
        exec odoo \
          -d "$DB_NAME" \
          --db_host="$DB_HOST" \
          --db_port="$DB_PORT" \
          --db_user="$DB_USER" \
          --db_password="$(cat /run/secrets/postgresql_password)" \
          --db_sslmode="$DB_SSLMODE"
      '

  nginx:
    image: nginx:alpine
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
volumes:
  odoo-web-data:

secrets:
  postgresql_password:
    file: odoo_pg_pass

services:
  web:
    image: odoo:17.0
    volumes:
      - odoo-web-data:/var/lib/odoo
      - ./config:/etc/odoo
      - ./addons:/mnt/extra-addons
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-odoo}
      DB_NAME: ${DB_NAME:-odoo-demo}
      DB_SSLMODE: ${DB_SSLMODE:-prefer}
    secrets:
      - postgresql_password
    command: >
      sh -lc '
        exec odoo \
          -d "$DB_NAME" \
          --db_host="$DB_HOST" \
          --db_port="$DB_PORT" \
          --db_user="$DB_USER" \
          --db_password="$(cat /run/secrets/postgresql_password)" \
          --db_sslmode="$DB_SSLMODE"
      '

  nginx:
    image: nginx:alpine
    depends_on:
      - web
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
volumes:
  odoo-web-data:

secrets:
  postgresql_password:
    file: odoo_pg_pass

services:
  web:
    depends_on:
      - db
    ports:
      - "8069:8069"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: odoo
      DB_NAME: odoo-demo
      DB_SSLMODE: prefer

  db:
    image: postgres:18
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgresql_password
      - POSTGRES_USER=odoo
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - odoo-db-data-pg18:/var/lib/postgresql/data/pgdata
    secrets:
      - postgresql_password

volumes:
  odoo-db-data-pg18:
    external: true
